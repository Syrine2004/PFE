spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: concours-service
          uri: lb://CONCOURS-SERVICE
          predicates:
            - Path=/api/concours/**
        - id: dossier-service
          uri: lb://DOSSIER-SERVICE
          predicates:
            - Path=/api/dossiers/**
      globalcors:
        add-to-chain: true
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:4200"
            allowedMethods: 
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "PATCH"
              - "OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
