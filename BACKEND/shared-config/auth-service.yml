spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/residanat_db
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
