spring:
  application:
    name: convocation-service
  datasource:
    url: jdbc:postgresql://localhost:5436/residanat_convocation_db
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    template:
      routing-key: q.convocation.request
      exchange: convocation.exchange

server:
  port: 8086

file:
  upload-dir: stockage/convocations

logging:
  level:
    root: INFO
    tn.sante.residanat.convocation: DEBUG
