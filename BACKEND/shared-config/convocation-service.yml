spring:
  application:
    name: convocation-service
  datasource:
    url: jdbc:postgresql://localhost:5436/residanat_convocation_db
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    template:
      routing-key: q.convocation.request
      exchange: convocation.exchange

server:
  port: 8086

file:
  upload-dir: stockage/convocations

logging:
  level:
    root: INFO
    tn.sante.residanat.convocation: DEBUG

convocation:
  verify:
    # URL de vérification - FIXÉ pour la présentation (Wi-Fi)
    base-url: ${CONVOCATION_VERIFY_BASE_URL:http://192.168.1.13:8080/api/convocations/verifier}

rabbit:
  listener:
    enabled: true
