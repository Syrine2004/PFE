spring:
  rabbitmq:
    template:
      routing-key: q.ia.request
      exchange: ia.exchange
  datasource:
    url: jdbc:postgresql://localhost:5432/residanat_dossier_db
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

file:
  upload-dir: uploads/dossiers
