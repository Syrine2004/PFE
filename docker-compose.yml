services:
  # --- Databases ---
  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: residanat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: system
    ports:
      - "5433:5432"
    networks:
      - app-network

  postgres-concours:
    image: postgres:15
    environment:
      POSTGRES_DB: residanat_concours_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: system
    ports:
      - "5434:5432"
    networks:
      - app-network

  postgres-dossier:
    image: postgres:15
    environment:
      POSTGRES_DB: residanat_dossier_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: system
    ports:
      - "5435:5432"
    networks:
      - app-network

  postgres-convocation:
    image: postgres:15
    environment:
      POSTGRES_DB: residanat_convocation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: system
    ports:
      - "5436:5432"
    networks:
      - app-network

  postgres-notification:
    image: postgres:15
    environment:
      POSTGRES_DB: residanat_notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: system
    ports:
      - "5437:5432"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # --- Infrastructure ---
  discovery-service:
    build:
      context: ./BACKEND/discovery-service
    ports:
      - "8761:8761"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-service:
    build:
      context: ./BACKEND/config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./BACKEND/shared-config:/app/config
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - app-network

  # --- Microservices ---
  auth-service:
    build:
      context: ./BACKEND/residanat-backend-auth-service-main
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      config-service:
        condition: service_healthy
      postgres-auth:
        condition: service_started
    networks:
      - app-network

  concours-service:
    build:
      context: ./BACKEND/residanat-backend-concours-service
    container_name: concours-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      config-service:
        condition: service_healthy
      postgres-concours:
        condition: service_started
    networks:
      - app-network

  dossier-service:
    build:
      context: ./BACKEND/Dossier-Candidature-service
    container_name: dossier-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    volumes:
      - dossier-uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      config-service:
        condition: service_healthy
      postgres-dossier:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  ia-validation-service:
    build:
      context: ./BACKEND/ia-validation-service
    container_name: ia-validation-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    volumes:
      - dossier-uploads:/app/uploads
      - ./test-IA-residanat/test_ia.py:/app/scripts/test_ia.py
      - ./test-IA-residanat/test_diplome_ia.py:/app/scripts/test_diplome_ia.py
      - ./test-IA-residanat/test_photo_ia.py:/app/scripts/test_photo_ia.py
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      config-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  convocation-service:
    build:
      context: ./BACKEND/convocation-service
    container_name: convocation-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=convocation-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - CONVOCATION_VERIFY_BASE_URL=${CONVOCATION_VERIFY_BASE_URL:-http://localhost:8080/api/convocations/verifier}
    volumes:
      - ./BACKEND/convocation-service/stockage:/app/stockage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      config-service:
        condition: service_healthy
      postgres-convocation:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  notification-service:
    build:
      context: ./BACKEND/notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - CONFIG_SERVER_URL=http://config-service:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notification:5432/residanat_notification_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=system
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      config-service:
        condition: service_healthy
      postgres-notification:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  gateway-service:
    build:
      context: ./BACKEND/gateway-service-main
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dossier-uploads:
