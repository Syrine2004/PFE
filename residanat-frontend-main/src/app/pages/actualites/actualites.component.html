<div class="page-container">
    <div class="content-wrapper">
        <div class="page-header">
            <p class="section-tag">Actualites</p>
            <h1 class="page-title">Dernieres actualites</h1>
            <p class="page-description">
                Restez informe des dernieres nouvelles concernant le concours
                national de residanat en medecine.
            </p>
        </div>

        <div class="articles-grid">
            <article *ngFor="let article of articles" class="article-card">
                <div class="card-image-placeholder">
                    <div class="icon-box">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
                            <line x1="7" y1="7" x2="7.01" y2="7" />
                        </svg>
                    </div>
                </div>
                <div class="card-content">
                    <div class="card-meta">
                        <span class="category-badge">{{ article.category }}</span>
                        <div class="meta-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            {{ article.date }}
                        </div>
                    </div>
                    <h2 class="card-title">{{ article.title }}</h2>
                    <p class="card-excerpt">{{ article.excerpt }}</p>
                    <a routerLink="#" class="read-more">
                        Lire plus
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </a>
                </div>
            </article>
        </div>
    </div>
</div>
