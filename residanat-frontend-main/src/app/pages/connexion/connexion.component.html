<div class="auth-page">

  <!-- Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-wrapper">

    <!-- Logo & Header -->
    <div class="auth-header">
      <img src="assets/images/logo.png" alt="Logo" class="auth-logo">
      <h1 class="auth-title">Se connecter</h1>
      <p class="auth-subtitle">Accédez à votre espace candidat</p>
    </div>

    <!-- Glass Card -->
    <div class="glass-card">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Identifiant -->
        <div class="field-group">
          <label for="cin" class="field-label">Numéro d'identité</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="14" x="2" y="5" rx="2" />
                <line x1="2" y1="10" x2="22" y2="10" />
              </svg>
            </span>
            <input id="cin" type="text" formControlName="cin" placeholder="Votre CIN ou Passeport"
              class="auth-input" autocomplete="username"
              [class.input-error]="loginForm.get('cin')?.invalid && loginForm.get('cin')?.touched" />
          </div>
          <div class="error-container" *ngIf="loginForm.get('cin')?.invalid && loginForm.get('cin')?.touched">
            <span class="error-msg" *ngIf="loginForm.get('cin')?.errors?.['required']">
              L'identifiant est obligatoire
            </span>
            <span class="error-msg" *ngIf="loginForm.get('cin')?.errors?.['minlength']">
              L'identifiant doit contenir au moins 6 caractères
            </span>
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <div class="field-label-row">
            <label for="password" class="field-label">Mot de passe</label>
            <a href="javascript:void(0)" class="forgot-link" (click)="forgotPassword()">Mot de passe oublié ?</a>
          </div>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="Votre mot de passe" class="auth-input" autocomplete="current-password"
              [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
            <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <span class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Le mot de passe est requis
          </span>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
          Se connecter
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </button>

      </form>
    </div>

    <!-- Footer link -->
    <p class="auth-footer">
      Pas encore de compte ?
      <a routerLink="/inscription" class="auth-link">S&apos;inscrire</a>
    </p>

  </div>
</div>
