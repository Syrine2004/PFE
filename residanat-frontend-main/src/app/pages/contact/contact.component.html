<div class="page-container">
    <div class="content-wrapper">
        <div class="page-header">
            <p class="section-tag">Contact</p>
            <h1 class="page-title">Nous contacter</h1>
            <p class="page-description">
                Vous avez une question ou besoin d&apos;assistance ? Notre
                equipe est a votre disposition pour vous aider.
            </p>
        </div>

        <div class="contact-grid">
            <div class="form-side">
                <div class="form-card">
                    <h2 class="card-title">Envoyez-nous un message</h2>
                    <form (ngSubmit)="onSubmit()" class="contact-form">
                        <div class="form-row">
                            <div class="field-group">
                                <label for="nom">Nom complet</label>
                                <input id="nom" name="nom" [(ngModel)]="nom" placeholder="Votre nom" class="form-input">
                            </div>
                            <div class="field-group">
                                <label for="email">Email</label>
                                <input id="email" type="email" name="email" [(ngModel)]="email"
                                    placeholder="votre&#64;email.com" class="form-input">
                            </div>
                        </div>
                        <div class="field-group">
                            <label for="sujet">Sujet</label>
                            <input id="sujet" name="sujet" [(ngModel)]="sujet" placeholder="Objet de votre message"
                                class="form-input">
                        </div>
                        <div class="field-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" [(ngModel)]="message"
                                placeholder="Decrivez votre demande..." rows="6" class="form-textarea"></textarea>
                        </div>
                        <button type="submit" class="submit-btn" [disabled]="!nom || !email || !message">
                            Envoyer le message
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polyline points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </form>
                </div>
            </div>

            <div class="info-side">
                <div class="info-cards">
                    <div *ngFor="let info of contactInfo" class="info-card">
                        <div class="icon-box">
                            <svg *ngIf="info.icon === 'mail'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="m22 2-7 20-4-9-9-4Z" />
                                <path d="M22 2 11 13" />
                            </svg>
                            <svg *ngIf="info.icon === 'phone'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                            <svg *ngIf="info.icon === 'map-pin'" xmlns="http://www.w3.org/2000/svg" width="20"
                                height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                            <svg *ngIf="info.icon === 'clock'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </div>
                        <div class="text-info">
                            <span class="info-label">{{ info.title }}</span>
                            <p class="info-value">{{ info.value }}</p>
                            <p class="info-desc">{{ info.description }}</p>
                        </div>
                    </div>
                </div>

                <div class="map-placeholder">
                    <div class="map-inner">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <p>Ministere de la Sante</p>
                        <span>Tunis, Tunisie</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
