<button class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu">
        <line x1="3" x2="21" y1="6" y2="6" />
        <line x1="3" x2="21" y1="12" y2="12" />
        <line x1="3" x2="21" y1="18" y2="18" />
    </svg>
</button>

<div *ngIf="mobileOpen" class="mobile-overlay" (click)="closeMobile()"></div>

<aside [ngClass]="{'sidebar-collapsed': collapsed, 'mobile-open': mobileOpen}" class="sidebar">

    <div class="sidebar-header" [ngClass]="{'header-collapsed': collapsed}">
        <a routerLink="/dashboard" class="logo-container">
            <img src="assets/images/logo.png" alt="Logo" class="logo-img" [ngClass]="{'logo-collapsed': collapsed}">
        </a>

        <button class="collapse-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
            <svg [ngClass]="{'rotate-180': collapsed}" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="lucide lucide-chevron-left transition-transform">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-items-wrapper">
            <ng-container *ngFor="let item of currentNavItems">
                <!-- Mutual Exclusivity: Inscription OR Consulter mon dossier -->
                <ng-container
                    *ngIf="item.label === 'Inscription au concours' || item.label === 'Consulter mon dossier'">
                    <!-- Inscription: Visible for modification even if dossier exists -->
                    <a *ngIf="item.label === 'Inscription au concours' && userRole !== 'ADMIN'" [routerLink]="item.href"
                        routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobile()"
                        class="nav-item group">
                        <div class="item-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                <polyline points="14 2 14 8 20 8" />
                                <line x1="12" x2="12" y1="18" y2="12" />
                                <line x1="9" x2="15" y1="15" y2="15" />
                            </svg>
                        </div>
                        <span *ngIf="!collapsed" class="item-label">{{item.label}}</span>
                    </a>

                    <!-- Consulter mon dossier: Only if dossier EXISTS -->
                    <a *ngIf="item.label === 'Consulter mon dossier' && hasDossier && userRole !== 'ADMIN'"
                        [routerLink]="['/dashboard/dossier', getCandidatId()]" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}" (click)="closeMobile()" class="nav-item group">
                        <div class="item-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" />
                            </svg>
                        </div>
                        <span *ngIf="!collapsed" class="item-label">{{item.label}}</span>
                    </a>
                </ng-container>

                <!-- Regular Nav Items -->
                <ng-container
                    *ngIf="item.label !== 'Inscription au concours' && item.label !== 'Consulter mon dossier'">
                    <!-- Links for real pages -->
                    <a *ngIf="item.href !== '#' && item.label !== 'Spécialités' && item.label !== 'Visualisation 3D' && item.label !== 'Convocation' && item.label !== 'Résultats' && item.label !== 'Réclamation'"
                        [routerLink]="item.href" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                        (click)="closeMobile()" class="nav-item group">
                        <div class="item-icon">
                            <ng-container [ngSwitch]="item.icon">
                                <svg *ngSwitchCase="'home'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                    <polyline points="9 22 9 12 15 12 15 22" />
                                </svg>
                                <svg *ngSwitchCase="'layout-dashboard'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="7" height="9" x="3" y="3" rx="1" />
                                    <rect width="7" height="5" x="14" y="3" rx="1" />
                                    <rect width="7" height="9" x="14" y="12" rx="1" />
                                    <rect width="7" height="5" x="3" y="16" rx="1" />
                                </svg>
                                <svg *ngSwitchCase="'file-plus'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                    <polyline points="14 2 14 8 20 8" />
                                    <line x1="12" x2="12" y1="18" y2="12" />
                                    <line x1="9" x2="15" y1="15" y2="15" />
                                </svg>
                                <svg *ngSwitchCase="'users'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                                    <circle cx="9" cy="7" r="4" />
                                    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                                </svg>
                                <svg *ngSwitchCase="'settings'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </ng-container>
                        </div>
                        <span *ngIf="!collapsed" class="item-label">{{item.label}}</span>
                    </a>

                    <!-- Mocks for services -->
                    <div *ngIf="item.label === 'Spécialités' || item.label === 'Visualisation 3D' || item.label === 'Convocation' || item.label === 'Résultats' || item.label === 'Réclamation'"
                        class="nav-item group interactive-mock" (click)="onMockClick($event, item.label)">
                        <div class="item-icon">
                            <ng-container [ngSwitch]="item.icon">
                                <svg *ngSwitchCase="'stethoscope'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3" />
                                    <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4" />
                                    <circle cx="20" cy="10" r="2" />
                                </svg>
                                <svg *ngSwitchCase="'map-pin'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                                    <circle cx="12" cy="10" r="3" />
                                </svg>
                                <svg *ngSwitchCase="'file-text'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                    <polyline points="14 2 14 8 20 8" />
                                    <path d="M9 13h6" />
                                    <path d="M9 17h6" />
                                </svg>
                                <svg *ngSwitchCase="'bar-chart-3'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 3v18h18" />
                                    <path d="M18 17V9" />
                                    <path d="M13 17V5" />
                                    <path d="M8 17v-3" />
                                </svg>
                                <svg *ngSwitchCase="'message-circle'" xmlns="http://www.w3.org/2000/svg" width="18"
                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m3 21 1.9-1.9a9 9 0 1 1 3.4 3.4L3 21Z" />
                                </svg>
                            </ng-container>
                        </div>
                        <span *ngIf="!collapsed" class="item-label">{{item.label}}</span>
                    </div>
                </ng-container>
            </ng-container>
        </div>
    </nav>

    <div class="sidebar-footer">
        <div class="user-profile" [ngClass]="{'profile-center': collapsed}">
            <div class="user-avatar">{{ userName.charAt(0) || 'U' }}</div>
            <div *ngIf="!collapsed" class="user-info">
                <p class="user-name">{{ userName }}</p>
                <p class="user-email">{{ userEmail }}</p>
            </div>
        </div>

        <button (click)="onLogout()" class="logout-btn" [ngClass]="{'logout-center': collapsed}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-log-out">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" x2="9" y1="12" y2="12" />
            </svg>
            <span *ngIf="!collapsed">Deconnexion</span>
        </button>
    </div>

</aside>
